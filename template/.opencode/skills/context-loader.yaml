name: context-loader
description: >
  Carga contexto automático del proyecto según la tarea. Identifica el módulo afectado
  y precarga documentación de la bóveda + archivos fuente + consulta al grafo de Graphify.
  Ejecutar SIEMPRE antes de iniciar cualquier implementación.

instructions: |
  ## Flujo de carga de contexto

  1. **Identificar dominio**: Ejecutar `node scripts/load-context.mjs <tarea>` para detectar
     el módulo afectado.

  2. **Cargar context-map**: Leer `.opencode/context-map.yaml` y buscar la entrada del dominio
     detectado para obtener:
     - `docs`: Documentación en la bóveda
     - `lib`: Archivos fuente del módulo
     - `graph_query`: Query para Graphify

  3. **Consultar Graphify**: Ejecutar `graphify query "deps of lib/<modulo>"` para obtener
     las dependencias del módulo. También `graphify query "describe lib/<modulo>"` para
     entender sus responsabilidades.

  4. **Precargar contexto**: Leer los archivos de `docs` y `lib` indicados en el context-map.
     Esto garantiza que el agente tenga el contexto completo antes de empezar a implementar.

  5. **Para bugs/troubleshooting**: Si el context-map no tiene entrada específica, consultar
     `boveda/🗺 Roadmap/Troubleshooting.md` para errores conocidos.

  ## Ejemplo

  Tarea: "Agregar campo teléfono a solicitudes de monitorista"

  1. `node scripts/load-context.mjs "agregar campo telefono a solicitudes de monitorista"`
     → devuelve: `monitorista`

  2. context-map.yaml → monitorista:
     - docs: boveda/🧩 Features/Monitorista.md
     - lib: lib/monitorista/
     - graph_query: deps of lib/monitorista

  3. `graphify query "deps of lib/monitorista"` → dependencias

  4. Leer: boveda/🧩 Features/Monitorista.md + lib/monitorista/types.ts +
     lib/monitorista/mapper.ts + lib/monitorista/repository.ts +
     lib/monitorista/service.ts

  ## Reglas

  - Si el dominio no se detecta automáticamente, preguntar al usuario
  - Siempre ejecutar el typechecker del proyecto después de cambios
  - Siempre ejecutar `npx graphify update` para mantener el grafo sincronizado
  - Si hay cambios en BD, ejecutar el script de esquema correspondiente

resources:
  - ".opencode/context-map.yaml"
  - "scripts/load-context.mjs"
